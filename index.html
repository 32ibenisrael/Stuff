<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaccine Hero: Neon Pandemic</title>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ff;
            --neon-green: #39ff14;
            --covid-red: #ff0033;
            --tp-white: #ffffff;
            --bg-color: #050505;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: var(--neon-blue);
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        #speed-controls { margin-bottom: 15px; display: flex; gap: 10px; }

        button {
            background: rgba(0, 243, 255, 0.1);
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 8px 16px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            transition: 0.2s;
        }

        button:hover, button.active {
            background: var(--neon-blue);
            color: black;
            box-shadow: 0 0 20px var(--neon-blue);
        }

        #game-container {
            position: relative;
            width: 800px;
            height: 300px;
            border-bottom: 4px solid var(--neon-blue);
            background: linear-gradient(to bottom, transparent 80%, rgba(0, 243, 255, 0.05));
            overflow: hidden;
        }

        /* Stickman & Syringe */
        #hero {
            position: absolute;
            bottom: 0;
            left: 60px;
            width: 40px;
            height: 60px;
            will-change: transform;
        }

        .stickman-head {
            position: absolute;
            width: 14px; height: 14px;
            border: 2px solid var(--neon-pink);
            border-radius: 50%;
            top: 0; left: 11px;
            box-shadow: 0 0 10px var(--neon-pink);
        }

        .stickman-body {
            position: absolute;
            width: 2px; height: 25px;
            background: var(--neon-pink);
            left: 19px; top: 16px;
            box-shadow: 0 0 10px var(--neon-pink);
        }

        /* The Syringe */
        .syringe {
            position: absolute;
            left: 5px; top: 5px;
            width: 35px; height: 12px;
        }

        .syringe-barrel {
            width: 20px; height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid var(--neon-blue);
            position: absolute;
        }

        .syringe-plunger {
            width: 10px; height: 2px;
            background: var(--neon-blue);
            position: absolute; left: -10px; top: 3px;
        }

        .syringe-needle {
            width: 8px; height: 1px;
            background: #eee;
            position: absolute; right: -8px; top: 4px;
        }

        /* Toilet Paper Obstacle */
        .tp-roll {
            position: absolute;
            bottom: 0;
            width: 35px; height: 35px;
            background: var(--tp-white);
            border-radius: 5px;
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 10px var(--tp-white);
        }

        .tp-roll::after {
            content: '';
            position: absolute;
            width: 10px; height: 10px;
            background: #ccc;
            border-radius: 50%;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }

        /* COVID-19 Enemy */
        .covid {
            position: absolute;
            width: 30px; height: 30px;
            background: var(--covid-red);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--covid-red);
            animation: pulse 1.2s infinite alternate;
        }

        .covid::before {
            content: 'x'; color: white; font-weight: bold;
            display: flex; justify-content: center; align-items: center;
            height: 100%; font-size: 20px;
        }

        .vaccine-shot {
            position: absolute;
            width: 15px; height: 4px;
            background: var(--neon-green);
            border-radius: 2px;
            box-shadow: 0 0 12px var(--neon-green);
        }

        @keyframes pulse { from { transform: scale(0.9); } to { transform: scale(1.15); } }

        #score-board { margin-bottom: 10px; font-size: 28px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="speed-controls">
        <button onclick="setSpeed(0.5)">0.5x</button>
        <button class="active" onclick="setSpeed(1)">1x</button>
        <button onclick="setSpeed(2)">2x</button>
        <button onclick="setSpeed(3)">3x</button>
    </div>

    <div id="score-board">VACCINATED: 0 | BEST: <span id="high-score">0</span></div>
    
    <div id="game-container">
        <div id="hero">
            <div class="stickman-head"></div>
            <div class="stickman-body">
                <div class="syringe">
                    <div class="syringe-plunger"></div>
                    <div class="syringe-barrel"></div>
                    <div class="syringe-needle"></div>
                </div>
            </div>
        </div>
    </div>

    <div style="margin-top: 15px; opacity: 0.6;">[SPACE] JUMP | [S/ENTER] VACCINATE</div>

    <script>
        const hero = document.getElementById("hero");
        const container = document.getElementById("game-container");
        const scoreElement = document.getElementById("score-board");
        
        let score = 0;
        let gameSpeed = 1;
        let isGameOver = false;
        let jumping = false;
        let jumpVelocity = 0;
        let heroY = 0;
        const gravity = 0.6;

        function setSpeed(s) {
            gameSpeed = s;
            document.querySelectorAll('button').forEach(btn => {
                btn.classList.remove('active');
                if(parseFloat(btn.innerText) === s) btn.classList.add('active');
            });
        }

        function update() {
            if (isGameOver) return;
            if (jumping) {
                jumpVelocity -= gravity;
                heroY += jumpVelocity;
                if (heroY <= 0) { heroY = 0; jumping = false; }
            }
            hero.style.bottom = heroY + "px";
            requestAnimationFrame(update);
        }

        document.addEventListener("keydown", (e) => {
            if (e.code === "Space" && !jumping) { jumping = true; jumpVelocity = 12; }
            if (e.code === "KeyS" || e.code === "Enter") shoot();
        });

        function shoot() {
            if (isGameOver) return;
            const shot = document.createElement("div");
            shot.classList.add("vaccine-shot");
            shot.style.left = "100px";
            shot.style.bottom = (heroY + 35) + "px";
            container.appendChild(shot);

            let bPos = 100;
            function moveShot() {
                if (isGameOver) { shot.remove(); return; }
                bPos += (16 * gameSpeed);
                shot.style.left = bPos + "px";

                document.querySelectorAll(".covid").forEach(virus => {
                    if (checkHit(shot, virus)) {
                        virus.remove(); shot.remove();
                        score += 50; updateUI(); return;
                    }
                });
                if (bPos < 800) requestAnimationFrame(moveShot);
                else shot.remove();
            }
            requestAnimationFrame(moveShot);
        }

        function spawn() {
            if (isGameOver) return;
            const type = Math.random() > 0.5 ? 'covid' : 'tp-roll';
            const obj = document.createElement("div");
            obj.classList.add(type);
            
            let pos = 850;
            obj.style.left = pos + "px";
            if (type === 'covid') obj.style.bottom = (Math.random() * 120 + 50) + "px";
            
            container.appendChild(obj);

            function moveObj() {
                if (isGameOver) return;
                pos -= (8 * gameSpeed);
                obj.style.left = pos + "px";

                if (checkHit(hero, obj)) endGame();

                if (pos > -60) requestAnimationFrame(moveObj);
                else { obj.remove(); score += 10; updateUI(); }
            }
            requestAnimationFrame(moveObj);
            setTimeout(spawn, (Math.random() * 1400 + 700) / gameSpeed);
        }

        function checkHit(a, b) {
            const r1 = a.getBoundingClientRect();
            const r2 = b.getBoundingClientRect();
            return !(r1.right < r2.left || r1.left > r2.right || r1.bottom < r2.top || r1.top > r2.bottom);
        }

        function updateUI() {
            const hs = localStorage.getItem("vacHS") || 0;
            scoreElement.innerHTML = `VACCINATED: ${score} | BEST: ${hs}`;
        }

        function endGame() {
            isGameOver = true;
            const hs = localStorage.getItem("vacHS") || 0;
            if (score > hs) localStorage.setItem("vacHS", score);
            alert("QUARANTINE FAILED! Score: " + score);
            location.reload();
        }

        updateUI(); update(); spawn();
    </script>
</body>
</html>
