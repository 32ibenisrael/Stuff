<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Rooftop Runner</title>
    <style>
        body {
            margin: 0;
            background: #0a0a0a;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }
        canvas {
            border-bottom: 4px solid #00f2ff;
            background: linear-gradient(to bottom, #000428, #004e92);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
            margin-top: 20px;
        }
        .ui {
            position: absolute;
            top: 40px;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #00f2ff;
        }
    </style>
</head>
<body>
    <div class="ui">Score: <span id="score">0</span></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');

        canvas.width = 800;
        canvas.height = 400;

        // Game State
        let score = 0;
        let gameActive = true;

        // Player Object
        const player = {
            x: 50,
            y: 300,
            w: 30,
            h: 50,
            dy: 0,
            jumpForce: 12,
            gravity: 0.6,
            grounded: false,
            color: '#00f2ff'
        };

        // Obstacles
        const obstacles = [];
        let spawnTimer = 0;

        function spawnObstacle() {
            obstacles.push({
                x: canvas.width,
                y: canvas.height - 40,
                w: 20 + Math.random() * 30,
                h: 40,
                speed: 5 + (score / 500) // Gradually speed up
            });
        }

        function update() {
            if (!gameActive) return;

            // Gravity & Movement
            player.dy += player.gravity;
            player.y += player.dy;

            // Floor Collision
            if (player.y + player.h > canvas.height) {
                player.y = canvas.height - player.h;
                player.dy = 0;
                player.grounded = true;
            }

            // Obstacle Logic
            spawnTimer++;
            if (spawnTimer > 70 + Math.random() * 50) {
                spawnObstacle();
                spawnTimer = 0;
            }

            obstacles.forEach((obs, index) => {
                obs.x -= obs.speed;

                // Collision Detection
                if (
                    player.x < obs.x + obs.w &&
                    player.x + player.w > obs.x &&
                    player.y < obs.y + obs.h &&
                    player.y + player.h > obs.y
                ) {
                    gameOver();
                }

                // Remove off-screen obstacles
                if (obs.x + obs.w < 0) {
                    obstacles.splice(index, 1);
                    score += 10;
                    scoreElement.innerText = score;
                }
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Player
            ctx.fillStyle = player.color;
            ctx.shadowBlur = 15;
            ctx.shadowColor = player.color;
            ctx.fillRect(player.x, player.y, player.w, player.h);

            // Draw Obstacles
            ctx.fillStyle = '#ff0055';
            ctx.shadowColor = '#ff0055';
            obstacles.forEach(obs => {
                ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
            });

            ctx.shadowBlur = 0; // Reset blur for performance
        }

        function gameOver() {
            gameActive = false;
            alert(`Game Over! Score: ${score}`);
            location.reload();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Controls
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && player.grounded) {
                player.dy = -player.jumpForce;
                player.grounded = false;
            }
        });

        // Touch support
        window.addEventListener('touchstart', () => {
            if (player.grounded) {
                player.dy = -player.jumpForce;
                player.grounded = false;
            }
        });

        gameLoop();
    </script>
</body>
</html>
