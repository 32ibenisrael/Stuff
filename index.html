<!DOCTYPE html>
<html>
<head>
    <title>High-Speed Platformer</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        canvas { background: linear-gradient(#2c3e50, #000); border: 4px solid #fff; }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="800" height="400"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    let player = { x: 100, y: 300, w: 30, h: 30, dy: 0, jumping: false, color: "#ff4757" };
    let platforms =[];
    
    // Adjusted Constants for speed and jump
    let scrollSpeed = 5; 
    let gravity = 0.9;
    let jumpPower = -18; 
    let keys = {};

    function initPlatforms() {
        for (let i = 0; i < 5; i++) {
            platforms.push({ 
                x: i * 350, 
                y: 200 + Math.random() * 150, 
                w: 180, h: 20, 
                color: `hsl(${Math.random() * 360}, 70%, 60%)` 
            });
        }
    }

    window.addEventListener("keydown", e => keys[e.code] = true);
    window.addEventListener("keyup", e => keys[e.code] = false);

    function update() {
        // Jump logic
        if (keys["ArrowUp"] && !player.jumping) {
            player.dy = jumpPower;
            player.jumping = true;
        }

        player.dy += gravity;
        player.y += player.dy;

        // Scroll platforms and recycle
        for (let p of platforms) {
            p.x -= scrollSpeed;
            
            // Collision detection
            if (player.x < p.x + p.w && player.x + player.w > p.x &&
                player.y + player.h > p.y && player.y + player.h < p.y + p.h + player.dy) {
                player.y = p.y - player.h;
                player.dy = 0;
                player.jumping = false;
            }

            // Recycle platform
            if (p.x + p.w < 0) {
                p.x = canvas.width;
                p.y = 100 + Math.random() * 250;
                p.color = `hsl(${Math.random() * 360}, 70%, 60%)`;
                
                // Gradually increase speed over time
                scrollSpeed += 0.05; 
            }
        }

        // Game Over / Reset
        if (player.y > canvas.height) {
            player.y = 100;
            player.dy = 0;
            scrollSpeed = 5; // Reset speed on death
        }

        draw();
        requestAnimationFrame(update);
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Draw Platforms
        for (let p of platforms) {
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y, p.w, p.h);
        }

        // Draw Player
        ctx.fillStyle = player.color;
        ctx.fillRect(player.x, player.y, player.w, player.h);
    }

    initPlatforms();
    update();
</script>
</body>
</html>
