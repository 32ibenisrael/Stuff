<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Stickman Blaster</title>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ff;
            --neon-green: #39ff14;
            --bg-color: #0d0d0d;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: var(--neon-blue);
            font-family: 'Courier New', sans-serif;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            width: 800px;
            height: 250px;
            border-bottom: 3px solid var(--neon-blue);
            box-shadow: 0 10px 20px -10px var(--neon-blue);
            overflow: hidden;
        }

        /* Stickman Figure */
        #dino {
            position: absolute;
            bottom: 0;
            left: 50px;
            width: 40px;
            height: 60px;
        }

        .stickman-body {
            position: absolute;
            width: 2px;
            height: 30px;
            background: var(--neon-pink);
            left: 50%;
            bottom: 15px;
            box-shadow: 0 0 8px var(--neon-pink);
        }

        .stickman-head {
            position: absolute;
            width: 12px;
            height: 12px;
            border: 2px solid var(--neon-pink);
            border-radius: 50%;
            top: 2px;
            left: 13px;
            box-shadow: 0 0 8px var(--neon-pink);
        }

        /* Nerf Gun */
        .gun {
            position: absolute;
            width: 15px;
            height: 6px;
            background: var(--neon-green);
            right: -10px;
            top: 25px;
            box-shadow: 0 0 5px var(--neon-green);
        }

        /* Obstacles & Enemies */
        .cactus {
            position: absolute;
            bottom: 0;
            width: 20px;
            height: 40px;
            border: 2px solid var(--neon-blue);
            background: rgba(0, 243, 255, 0.1);
        }

        .enemy {
            position: absolute;
            width: 25px;
            height: 25px;
            border: 2px dashed #ff4d4d;
            border-radius: 50%;
            box-shadow: 0 0 10px #ff4d4d;
            animation: rotate 1s linear infinite;
        }

        .bullet {
            position: absolute;
            width: 10px;
            height: 4px;
            background: var(--neon-green);
            box-shadow: 0 0 10px var(--neon-green);
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #score-board { margin-bottom: 10px; font-size: 24px; }
        .jump-animation { animation: jump 0.5s ease-out; }
        @keyframes jump {
            0% { bottom: 0; }
            50% { bottom: 120px; }
            100% { bottom: 0; }
        }
    </style>
</head>
<body>

    <div id="score-board">Score: 0 | High Score: <span id="high-score">0</span></div>
    
    <div id="game-container">
        <div id="dino">
            <div class="stickman-head"></div>
            <div class="stickman-body">
                <div class="gun"></div>
            </div>
        </div>
    </div>

    <div style="margin-top: 15px;"><b>SPACE</b> to Jump | <b>S</b> or <b>ENTER</b> to Shoot</div>

    <script>
        const dino = document.getElementById("dino");
        const container = document.getElementById("game-container");
        const scoreElement = document.getElementById("score-board");
        const highScoreElement = document.getElementById("high-score");

        let score = 0;
        let highScore = localStorage.getItem("stickmanHighScore") || 0;
        highScoreElement.textContent = highScore;
        let isGameOver = false;

        // Jump & Shoot Events
        document.addEventListener("keydown", (e) => {
            if (e.code === "Space") jump();
            if (e.code === "KeyS" || e.code === "Enter") shoot();
        });

        function jump() {
            if (!dino.classList.contains("jump-animation") && !isGameOver) {
                dino.classList.add("jump-animation");
                setTimeout(() => dino.classList.remove("jump-animation"), 500);
            }
        }

        function shoot() {
            if (isGameOver) return;
            const bullet = document.createElement("div");
            bullet.classList.add("bullet");
            
            const dinoRect = dino.getBoundingClientRect();
            const containerRect = container.getBoundingClientRect();
            
            bullet.style.left = "90px";
            bullet.style.top = (dino.offsetTop + 25) + "px";
            container.appendChild(bullet);

            let bulletPos = 90;
            let bulletTimer = setInterval(() => {
                bulletPos += 10;
                bullet.style.left = bulletPos + "px";

                // Hit detection
                document.querySelectorAll(".enemy").forEach(enemy => {
                    if (isColliding(bullet, enemy)) {
                        enemy.remove();
                        bullet.remove();
                        clearInterval(bulletTimer);
                        score += 5;
                        updateScore();
                    }
                });

                if (bulletPos > 800) {
                    clearInterval(bulletTimer);
                    bullet.remove();
                }
            }, 10);
        }

        function createObstacle() {
            if (isGameOver) return;

            const type = Math.random() > 0.5 ? 'cactus' : 'enemy';
            const obj = document.createElement("div");
            obj.classList.add(type);
            
            let pos = 800;
            obj.style.left = pos + "px";
            if (type === 'enemy') obj.style.bottom = (Math.random() * 80 + 20) + "px";
            
            container.appendChild(obj);

            let timer = setInterval(() => {
                if (isGameOver) { clearInterval(timer); return; }
                
                pos -= 7;
                obj.style.left = pos + "px";

                if (isColliding(dino, obj)) gameOver();

                if (pos < -50) {
                    clearInterval(timer);
                    obj.remove();
                    score++;
                    updateScore();
                }
            }, 20);

            setTimeout(createObstacle, Math.random() * 1000 + 800);
        }

        function isColliding(a, b) {
            let aR = a.getBoundingClientRect();
            let bR = b.getBoundingClientRect();
            return !(aR.right < bR.left || aR.left > bR.right || aR.bottom < bR.top || aR.top > bR.bottom);
        }

        function updateScore() {
            scoreElement.innerHTML = `Score: ${score} | High Score: ${highScore}`;
        }

        function gameOver() {
            isGameOver = true;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem("stickmanHighScore", highScore);
            }
            alert("WASTED! Score: " + score);
            location.reload();
        }

        createObstacle();
    </script>
</body>
</html>
