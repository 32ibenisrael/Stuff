<!DOCTYPE html>
<html>
<head>
    <title>Slime Smash Ultimate</title>
    <style>
        body { margin: 0; background: #222; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white; font-family: 'Arial', sans-serif; }
        canvas { background: #333; border: 5px solid #fff; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #ui { margin-bottom: 10px; font-size: 24px; }
    </style>
</head>
<body>

<div id="ui">Score: <span id="score">0</span></div>
<canvas id="gameCanvas" width="800" height="400"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");

    let score = 0;
    let gameActive = true;

    // Player Object
    let player = { x: 100, y: 300, w: 40, h: 40, dx: 0, dy: 0, jumping: false, color: "#ff4757" };
    let gravity = 0.8;
    let keys = {};
    let enemies =[];

    // Controls
    window.addEventListener("keydown", e => keys[e.code] = true);
    window.addEventListener("keyup", e => keys[e.code] = false);

    function spawnEnemy() {
        if(Math.random() < 0.02) { // Chance to spawn
            enemies.push({ x: 800, y: 360, w: 40, h: 40, color: "#2ed573", dead: false });
        }
    }

    function update() {
        if (!gameActive) return;

        // Player Movement
        if (keys["ArrowLeft"]) player.dx = -6;
        else if (keys["ArrowRight"]) player.dx = 6;
        else player.dx = 0;

        if (keys["ArrowUp"] && !player.jumping) {
            player.dy = -15;
            player.jumping = true;
        }

        // Apply Physics
        player.dy += gravity;
        player.x += player.dx;
        player.y += player.dy;

        // Floor Collision
        if (player.y + player.h > 400) {
            player.y = 400 - player.h;
            player.dy = 0;
            player.jumping = false;
        }

        // Screen Boundaries
        if (player.x < 0) player.x = 0;
        if (player.x + player.w > 800) player.x = 800 - player.w;

        // Enemy Logic
        spawnEnemy();
        for (let i = enemies.length - 1; i >= 0; i--) {
            let e = enemies[i];
            e.x -= 4; // Move slime

            // Collision Detection
            if (player.x < e.x + e.w && player.x + player.w > e.x &&
                player.y < e.y + e.h && player.y + player.h > e.y) {
                
                // SMASH! (If player is falling and above the slime)
                if (player.dy > 0 && player.y + player.h < e.y + e.h / 2) {
                    player.dy = -10; // Bounce
                    e.dead = true;
                    score++;
                    scoreEl.innerText = score;
                } else {
                    // HIT! (Game Over)
                    score = 0;
                    scoreEl.innerText = score;
                    enemies =
