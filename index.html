<!DOCTYPE html>
<html>
<head>
<style>
    body { display: flex; flex-direction: column; align-items: center; background: #2c3e50; color: white; font-family: sans-serif; }
    #wheel-container { position: relative; margin-top: 50px; }
    #wheel { width: 400px; height: 400px; border-radius: 50%; border: 10px solid #d4af37; position: relative; overflow: hidden; transition: transform 6s cubic-bezier(0.15, 0, 0, 1); }
    .number { position: absolute; width: 50%; height: 50%; transform-origin: 100% 100%; left: 0; top: 0; display: flex; justify-content: flex-end; padding-top: 20px; clip-path: polygon(0 0, 100% 0, 100% 100%); font-weight: bold; font-size: 14px; }
    .pointer { position: absolute; top: -20px; left: 190px; width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent; border-top: 30px solid white; z-index: 10; }
    #result { margin-top: 30px; font-size: 32px; font-weight: bold; padding: 20px; }
</style>
</head>
<body>

    <div id="wheel-container">
        <div class="pointer"></div>
        <div id="wheel"></div>
    </div>
    <div id="result">SPIN TO WIN!</div>
    <button onclick="spin()" style="padding: 15px 40px; font-size: 18px; cursor: pointer;">SPIN</button>

<script>
    // Define the wheel with official colors
    const wheelData = [
        {n: 0, c: '#27ae60'}, {n: 32, c: '#c0392b'}, {n: 15, c: '#000'}, {n: 19, c: '#c0392b'}, {n: 4, c: '#000'},
        {n: 21, c: '#c0392b'}, {n: 2, c: '#000'}, {n: 25, c: '#c0392b'}, {n: 17, c: '#000'}, {n: 34, c: '#c0392b'},
        {n: 6, c: '#000'}, {n: 27, c: '#c0392b'}, {n: 13, c: '#000'}, {n: 36, c: '#c0392b'}, {n: 11, c: '#000'},
        {n: 30, c: '#c0392b'}, {n: 8, c: '#000'}, {n: 23, c: '#c0392b'}, {n: 10, c: '#000'}, {n: 5, c: '#c0392b'},
        {n: 24, c: '#000'}, {n: 16, c: '#c0392b'}, {n: 33, c: '#000'}, {n: 1, c: '#c0392b'}, {n: 20, c: '#000'},
        {n: 14, c: '#c0392b'}, {n: 31, c: '#000'}, {n: 9, c: '#c0392b'}, {n: 22, c: '#000'}, {n: 18, c: '#c0392b'},
        {n: 29, c: '#000'}, {n: 7, c: '#c0392b'}, {n: 28, c: '#000'}, {n: 12, c: '#c0392b'}, {n: 35, c: '#000'},
        {n: 3, c: '#c0392b'}, {n: 26, c: '#000'}
    ];

    const wheel = document.getElementById('wheel');
    const resultDiv = document.getElementById('result');
    let currentRotation = 0;

    wheelData.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'number';
        div.style.backgroundColor = item.c;
        div.style.transform = `rotate(${i * (360 / 37)}deg) skewY(-80.27deg)`;
        div.innerHTML = `<span style="transform: skewY(80.27deg) rotate(90deg); margin-right: 15px;">${item.n}</span>`;
        wheel.appendChild(div);
    });

    function spin() {
        const slice = 360 / 37;
        const randomIndex = Math.floor(Math.random() * 37);
        
        // We spin to the inverse of the index because the wheel rotates clockwise
        currentRotation += (5 * 360) + (randomIndex * slice);
        wheel.style.transform = `rotate(${currentRotation}deg)`;

        setTimeout(() => {
            // Calculate the winning index based on the final rotation
            const winningIndex = (37 - (Math.round(currentRotation % 360 / slice))) % 37;
            const winner = wheelData[winningIndex];
            const colorName = winner.c === '#27ae60' ? 'Green' : (winner.c === '#c0392b' ? 'Red' : 'Black');
            
            resultDiv.innerHTML = `Result: <span style="color:${winner.c === '#000' ? '#fff' : winner.c}">${winner.n} (${colorName})</span>`;
        }, 6000);
    }
</script>
</body>
</html>
