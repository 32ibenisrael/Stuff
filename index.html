<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Stickman: Blaster Edition</title>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ff;
            --neon-green: #39ff14;
            --neon-orange: #ff6700;
            --bg-color: #0d0d0d;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: var(--neon-blue);
            font-family: 'Courier New', sans-serif;
            overflow: hidden;
        }

        /* Speed Controls */
        #speed-controls {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }

        button {
            background: transparent;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 5px 15px;
            cursor: pointer;
            box-shadow: 0 0 5px var(--neon-blue);
            transition: 0.2s;
        }

        button:hover, button.active {
            background: var(--neon-blue);
            color: black;
            box-shadow: 0 0 15px var(--neon-blue);
        }

        #game-container {
            position: relative;
            width: 800px;
            height: 250px;
            border-bottom: 3px solid var(--neon-blue);
            box-shadow: 0 10px 20px -10px var(--neon-blue);
            overflow: hidden;
        }

        /* Improved Stickman & Realistic Blaster */
        #dino {
            position: absolute;
            bottom: 0;
            left: 50px;
            width: 40px;
            height: 60px;
        }

        .stickman-head {
            position: absolute;
            width: 12px;
            height: 12px;
            border: 2px solid var(--neon-pink);
            border-radius: 50%;
            top: 2px;
            left: 13px;
            box-shadow: 0 0 8px var(--neon-pink);
        }

        .stickman-body {
            position: absolute;
            width: 2px;
            height: 25px;
            background: var(--neon-pink);
            left: 50%;
            bottom: 20px;
            box-shadow: 0 0 8px var(--neon-pink);
        }

        /* The Realistic Blaster */
        .blaster {
            position: absolute;
            right: -15px;
            top: 5px;
            width: 25px;
            height: 12px;
        }

        .gun-barrel {
            width: 20px;
            height: 6px;
            background: #444;
            border: 1px solid var(--neon-green);
            position: absolute;
            top: 0;
        }

        .gun-tip {
            width: 4px;
            height: 6px;
            background: var(--neon-orange);
            position: absolute;
            right: -4px;
            top: 0;
        }

        .gun-handle {
            width: 4px;
            height: 8px;
            background: #444;
            position: absolute;
            top: 5px;
            left: 5px;
            transform: rotate(20deg);
        }

        /* Projectiles & Enemies */
        .bullet {
            position: absolute;
            width: 8px;
            height: 4px;
            background: var(--neon-orange);
            border-radius: 2px;
            box-shadow: 0 0 8px var(--neon-orange);
        }

        .cactus {
            position: absolute;
            bottom: 0;
            width: 20px;
            height: 40px;
            border: 2px solid var(--neon-blue);
            background: rgba(0, 243, 255, 0.1);
        }

        .enemy {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid #ff4d4d;
            background: rgba(255, 77, 77, 0.2);
            box-shadow: 0 0 10px #ff4d4d;
        }

        #score-board { margin-bottom: 10px; font-size: 24px; }
        .jump-animation { animation: jump 0.5s ease-out; }
        @keyframes jump {
            0% { bottom: 0; }
            50% { bottom: 130px; }
            100% { bottom: 0; }
        }
    </style>
</head>
<body>

    <div id="speed-controls">
        <button onclick="setSpeed(0.5)">0.5x</button>
        <button class="active" onclick="setSpeed(1)">1x</button>
        <button onclick="setSpeed(2)">2x</button>
        <button onclick="setSpeed(3)">3x</button>
    </div>

    <div id="score-board">Score: 0 | High: <span id="high-score">0</span></div>
    
    <div id="game-container">
        <div id="dino">
            <div class="stickman-head"></div>
            <div class="stickman-body">
                <div class="blaster">
                    <div class="gun-barrel"></div>
                    <div class="gun-tip"></div>
                    <div class="gun-handle"></div>
                </div>
            </div>
        </div>
    </div>

    <div style="margin-top: 15px;"><b>SPACE</b> Jump | <b>S/ENTER</b> Shoot</div>

    <script>
        const dino = document.getElementById("dino");
        const container = document.getElementById("game-container");
        const scoreElement = document.getElementById("score-board");
        
        let score = 0;
        let gameSpeed = 1;
        let isGameOver = false;

        function setSpeed(s) {
            gameSpeed = s;
            document.querySelectorAll('button').forEach(btn => {
                btn.classList.remove('active');
                if(parseFloat(btn.innerText) === s) btn.classList.add('active');
            });
        }

        document.addEventListener("keydown", (e) => {
            if (e.code === "Space") jump();
            if (e.code === "KeyS" || e.code === "Enter") shoot();
        });

        function jump() {
            if (!dino.classList.contains("jump-animation") && !isGameOver) {
                dino.classList.add("jump-animation");
                setTimeout(() => dino.classList.remove("jump-animation"), 500);
            }
        }

        function shoot() {
            if (isGameOver) return;
            const bullet = document.createElement("div");
            bullet.classList.add("bullet");
            
            // Offset bullet to match gun tip
            bullet.style.left = "85px";
            bullet.style.top = (dino.offsetTop + 10) + "px";
            container.appendChild(bullet);

            let pos = 85;
            let timer = setInterval(() => {
                pos += (12 * gameSpeed);
                bullet.style.left = pos + "px";

                document.querySelectorAll(".enemy").forEach(en => {
                    if (checkHit(bullet, en)) {
                        en.remove();
                        bullet.remove();
                        clearInterval(timer);
                        score += 10;
                        updateUI();
                    }
                });

                if (pos > 800) { clearInterval(timer); bullet.remove(); }
            }, 20);
        }

        function spawn() {
            if (isGameOver) return;
            const type = Math.random() > 0.6 ? 'enemy' : 'cactus';
            const obj = document.createElement("div");
            obj.classList.add(type);
            
            let pos = 800;
            obj.style.left = pos + "px";
            if (type === 'enemy') obj.style.bottom = (Math.random() * 100 + 30) + "px";
            
            container.appendChild(obj);

            let timer = setInterval(() => {
                if (isGameOver) { clearInterval(timer); return; }
                pos -= (7 * gameSpeed);
                obj.style.left = pos + "px";

                if (checkHit(dino, obj)) endGame();

                if (pos < -50) {
                    clearInterval(timer);
                    obj.remove();
                    score++;
                    updateUI();
                }
            }, 20);

            setTimeout(spawn, (Math.random() * 1000 + 800) / gameSpeed);
        }

        function checkHit(a, b) {
            let r1 = a.getBoundingClientRect();
            let r2 = b.getBoundingClientRect();
            return !(r1.right < r2.left || r1.left > r2.right || r1.bottom < r2.top || r1.top > r2.bottom);
        }

        function updateUI() {
            scoreElement.innerHTML = `Score: ${score} | High: ${localStorage.getItem("nerfHS") || 0}`;
        }

        function endGame() {
            isGameOver = true;
            let hs = localStorage.getItem("nerfHS") || 0;
            if (score > hs) localStorage.setItem("nerfHS", score);
            alert("WASTED! Score: " + score);
            location.reload();
        }

        spawn();
    </script>
</body>
</html>
