<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Dino Runner</title>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ff;
            --bg-color: #0d0d0d;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: var(--neon-blue);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            width: 800px;
            height: 200px;
            border-bottom: 2px solid var(--neon-blue);
            box-shadow: 0 10px 20px -10px var(--neon-blue);
            overflow: hidden;
        }

        #dino {
            position: absolute;
            bottom: 0;
            left: 50px;
            width: 40px;
            height: 40px;
            border: 2px solid var(--neon-pink);
            box-shadow: 0 0 10px var(--neon-pink);
            background: rgba(255, 0, 255, 0.1);
        }

        .cactus {
            position: absolute;
            bottom: 0;
            right: -50px;
            width: 25px;
            height: 50px;
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 10px var(--neon-blue);
            background: rgba(0, 243, 255, 0.1);
        }

        #score-board {
            margin-top: 20px;
            font-size: 24px;
            text-shadow: 0 0 5px var(--neon-blue);
        }

        .jump-animation {
            animation: jump 0.5s linear;
        }

        @keyframes jump {
            0% { bottom: 0; }
            30% { bottom: 100px; }
            70% { bottom: 100px; }
            100% { bottom: 0; }
        }

        #instructions {
            margin-top: 10px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div id="score-board">Score: 0 | High Score: <span id="high-score">0</span></div>
    
    <div id="game-container">
        <div id="dino"></div>
    </div>

    <div id="instructions">Press <b>SPACE</b> or <b>CLICK</b> to Jump</div>

    <script>
        const dino = document.getElementById("dino");
        const container = document.getElementById("game-container");
        const scoreElement = document.getElementById("score-board");
        const highScoreElement = document.getElementById("high-score");

        let score = 0;
        let highScore = localStorage.getItem("dinoHighScore") || 0;
        highScoreElement.textContent = highScore;

        let isGameOver = false;

        // Jump Logic
        function jump() {
            if (isGameOver) {
                resetGame();
                return;
            }
            if (!dino.classList.contains("jump-animation")) {
                dino.classList.add("jump-animation");
                setTimeout(() => {
                    dino.classList.remove("jump-animation");
                }, 500);
            }
        }

        document.addEventListener("keydown", (e) => {
            if (e.code === "Space") jump();
        });

        document.addEventListener("mousedown", jump);

        // Obstacle Logic
        function createCactus() {
            if (isGameOver) return;

            const cactus = document.createElement("div");
            cactus.classList.add("cactus");
            container.appendChild(cactus);

            let position = 800;
            let randomSpeed = 5 + Math.random() * 5; // Random speed for variety

            let timer = setInterval(() => {
                // Collision Detection
                let dinoTop = parseInt(window.getComputedStyle(dino).getPropertyValue("top"));
                let cactusLeft = parseInt(window.getComputedStyle(cactus).getPropertyValue("left"));

                if (cactusLeft > 50 && cactusLeft < 90 && dinoTop >= 150) {
                    gameOver();
                    clearInterval(timer);
                }

                if (position < -50) {
                    clearInterval(timer);
                    container.removeChild(cactus);
                    if (!isGameOver) {
                        score++;
                        updateScore();
                    }
                }

                position -= randomSpeed;
                cactus.style.left = position + "px";
            }, 20);

            // Randomize next obstacle spawn
            let nextSpawn = Math.random() * (2000 - 700) + 700;
            setTimeout(createCactus, nextSpawn);
        }

        function updateScore() {
            scoreElement.innerHTML = `Score: ${score} | High Score: ${highScore}`;
        }

        function gameOver() {
            isGameOver = true;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem("dinoHighScore", highScore);
            }
            alert(`GAME OVER! Final Score: ${score}\nPress OK to restart.`);
            resetGame();
        }

        function resetGame() {
            location.reload();
        }

        // Start Game
        createCactus();
    </script>
</body>
</html>
