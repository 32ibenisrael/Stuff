<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Doctor: City Defense</title>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ff;
            --neon-green: #39ff14;
            --covid-red: #ff0033;
            --tp-white: #ffffff;
            --mask-blue: #70d1ff;
            --window-cyan: #00ffff;
            --bg-color: #050505;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: var(--neon-blue);
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        #speed-controls { margin-bottom: 15px; display: flex; gap: 10px; z-index: 10; }

        button {
            background: rgba(0, 243, 255, 0.1);
            border: 2px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 8px 16px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
        }

        button.active { background: var(--neon-blue); color: black; box-shadow: 0 0 20px var(--neon-blue); }

        #game-outer {
            position: relative;
            width: 800px;
            height: 300px;
            border-bottom: 4px solid var(--neon-pink);
            background: #000;
            overflow: hidden;
        }

        /* Buildings */
        .building {
            position: absolute;
            bottom: 0;
            border: 2px solid var(--neon-blue);
            background: rgba(0, 243, 255, 0.1);
            z-index: 1;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            padding: 5px;
            gap: 5px;
        }

        .window {
            width: 8px; height: 8px;
            background: var(--window-cyan);
            box-shadow: 0 0 8px var(--window-cyan);
        }

        /* Doctor */
        #doctor {
            position: absolute;
            bottom: 0;
            left: 60px;
            width: 50px;
            height: 75px;
            z-index: 5;
        }

        .head {
            position: absolute;
            width: 18px; height: 18px;
            border: 2px solid var(--neon-pink);
            border-radius: 50%;
            top: 0; left: 11px;
            box-shadow: 0 0 10px var(--neon-pink);
            background: var(--bg-color);
        }

        .mask {
            position: absolute;
            width: 12px; height: 8px;
            background: var(--mask-blue);
            bottom: -1px; left: 6px;
            border-radius: 2px;
        }

        .strap { position: absolute; width: 8px; height: 1px; background: rgba(255,255,255,0.7); left: -4px; }
        .strap-top { top: 2px; transform: rotate(-20deg); }
        .strap-bottom { bottom: 2px; transform: rotate(20deg); }

        .lab-coat {
            position: absolute;
            width: 16px; height: 28px;
            background: #fff;
            left: 14px; top: 20px;
            box-shadow: 0 0 15px #fff;
        }

        .leg {
            position: absolute;
            width: 3px; height: 22px;
            background: var(--neon-pink);
            bottom: 5px;
        }
        .leg-left { left: 16px; }
        .leg-right { left: 23px; }

        .running .leg-left { animation: stride 0.4s infinite alternate; }
        .running .leg-right { animation: stride 0.4s infinite alternate-reverse; }

        @keyframes stride { from { transform: rotate(-25deg); } to { transform: rotate(25deg); } }

        .syringe { position: absolute; left: 22px; top: 28px; width: 35px; height: 12px; }
        .syringe-barrel { width: 18px; height: 7px; background: rgba(255,255,255,0.3); border: 1px solid var(--neon-blue); position: absolute; }
        .syringe-needle { width: 10px; height: 1px; background: #eee; position: absolute; right: -10px; top: 3px; }

        /* Projectiles */
        .vaccine-shot {
            position: absolute;
            width: 16px; height: 4px;
            background: var(--neon-green);
            box-shadow: 0 0 15px var(--neon-green);
            z-index: 6;
        }

        .shot-trail {
            position: absolute;
            height: 2px;
            background: linear-gradient(to left, var(--neon-green), transparent);
            opacity: 0.6;
            pointer-events: none;
        }

        /* Hazards */
        .tp-roll {
            position: absolute;
            bottom: 0;
            width: 35px; height: 35px;
            background: var(--tp-white);
            border: 2px solid var(--neon-blue);
            z-index: 4;
        }

        .covid {
            position: absolute;
            width: 30px; height: 30px;
            background: var(--covid-red);
            border-radius: 50%;
            box-shadow: 0 0 20px var(--covid-red);
            z-index: 4;
        }

        #score-board { margin-bottom: 10px; font-size: 28px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="speed-controls">
        <button onclick="setSpeed(0.5)">0.5x</button>
        <button class="active" onclick="setSpeed(1)">1x</button>
        <button onclick="setSpeed(2)">2x</button>
        <button onclick="setSpeed(3)">3x</button>
    </div>

    <div id="score-board">VACCINATED: 0 | BEST: <span id="high-score">0</span></div>
    
    <div id="game-outer">
        <div id="doctor" class="running">
            <div class="head">
                <div class="mask">
                    <div class="strap strap-top"></div>
                    <div class="strap strap-bottom"></div>
                </div>
            </div>
            <div class="lab-coat"></div>
            <div class="leg leg-left"></div>
            <div class="leg leg-right"></div>
            <div class="syringe">
                <div class="syringe-barrel"></div>
                <div class="syringe-needle"></div>
            </div>
        </div>
    </div>

    <div style="margin-top: 15px; opacity: 0.8;">[SPACE] JUMP | [S/ENTER] VACCINATE (0.7s CD)</div>

    <script>
        const doctor = document.getElementById("doctor");
        const container = document.getElementById("game-outer");
        const scoreElement = document.getElementById("score-board");
        
        let score = 0;
        let gameSpeed = 1;
        let isGameOver = false;
        let jumping = false;
        let jumpVelocity = 0;
        let doctorY = 0;
        const gravity = 0.6;

        // Shooting restriction
        let lastShotTime = 0;
        const shotCooldown = 700; 

        // Building tracking
        let lastBuildingX = 0;

        function setSpeed(s) {
            gameSpeed = s;
            document.querySelectorAll('button').forEach(btn => {
                btn.classList.remove('active');
                if(parseFloat(btn.innerText) === s) btn.classList.add('active');
            });
        }

        function update() {
            if (isGameOver) return;
            if (jumping) {
                jumpVelocity -= gravity;
                doctorY += jumpVelocity;
                if (doctorY <= 0) { doctorY = 0; jumping = false; doctor.classList.add('running'); }
            }
            doctor.style.bottom = doctorY + "px";
            requestAnimationFrame(update);
        }

        document.addEventListener("keydown", (e) => {
            if (e.code === "Space" && !jumping) { jumping = true; jumpVelocity = 12; doctor.classList.remove('running'); }
            if (e.code === "KeyS" || e.code === "Enter") shoot();
        });

        function shoot() {
            const now = Date.now();
            if (isGameOver || now - lastShotTime < shotCooldown) return;
            
            lastShotTime = now;
            const shot = document.createElement("div");
            shot.classList.add("vaccine-shot");
            shot.style.left = "110px";
            shot.style.bottom = (doctorY + 38) + "px";
            container.appendChild(shot);

            let bPos = 110;
            function moveShot() {
                if (isGameOver) { shot.remove(); return; }
                
                const trail = document.createElement("div");
                trail.classList.add("shot-trail");
                trail.style.left = bPos + "px";
                trail.style.bottom = (parseInt(shot.style.bottom) + 1) + "px";
                trail.style.width = (20 * gameSpeed) + "px";
                container.appendChild(trail);
                setTimeout(() => trail.remove(), 100);

                bPos += (16 * gameSpeed);
                shot.style.left = bPos + "px";
                document.querySelectorAll(".covid").forEach(v => {
                    if (checkHit(shot, v)) { v.remove(); shot.remove(); score += 50; updateUI(); }
                });
                if (bPos < 800) requestAnimationFrame(moveShot);
                else shot.remove();
            }
            requestAnimationFrame(moveShot);
        }

        function spawnBuilding() {
            if (isGameOver) return;

            // Only spawn if last building has moved enough to avoid overlap
            if (lastBuildingX < 700) { 
                const b = document.createElement("div");
                b.classList.add("building");
                let w = Math.random() * 60 + 60;
                let h = Math.random() * 150 + 60;
                b.style.width = w + "px";
                b.style.height = h + "px";
                b.style.left = "850px";

                for(let i=0; i<Math.floor((h/20)*2); i++) {
                    const win = document.createElement("div");
                    win.classList.add("window");
                    win.style.opacity = Math.random() > 0.3 ? "1" : "0.2";
                    b.appendChild(win);
                }

                container.appendChild(b);
                let pos = 850;
                lastBuildingX = 850;

                function move() {
                    if (isGameOver) return;
                    pos -= (2 * gameSpeed);
                    b.style.left = pos + "px";
                    // Update global tracker for this building's position
                    if (pos > lastBuildingX - 100) lastBuildingX = pos; 
                    
                    if (pos > -w) requestAnimationFrame(move);
                    else b.remove();
                }
                requestAnimationFrame(move);
            }
            setTimeout(spawnBuilding, 500 / gameSpeed);
        }

        function spawnHazard() {
            if (isGameOver) return;
            const type = Math.random() > 0.5 ? 'covid' : 'tp-roll';
            const obj = document.createElement("div");
            obj.classList.add(type);
            let pos = 850;
            obj.style.left = pos + "px";
            if (type === 'covid') obj.style.bottom = (Math.random() * 120 + 60) + "px";
            container.appendChild(obj);

            function move() {
                if (isGameOver) return;
                pos -= (8 * gameSpeed);
                obj.style.left = pos + "px";
                if (checkHit(doctor, obj)) endGame();
                if (pos > -60) requestAnimationFrame(move);
                else { obj.remove(); score += 10; updateUI(); }
            }
            requestAnimationFrame(move);
            setTimeout(spawnHazard, (Math.random() * 1400 + 700) / gameSpeed);
        }

        function checkHit(a, b) {
            const r1 = a.getBoundingClientRect();
            const r2 = b.getBoundingClientRect();
            return !(r1.right < r2.left || r1.left > r2.right || r1.bottom < r2.top || r1.top > r2.bottom);
        }

        function updateUI() {
            const hs = localStorage.getItem("retroHS") || 0;
            scoreElement.innerHTML = `VACCINATED: ${score} | BEST: ${hs}`;
        }

        function endGame() {
            isGameOver = true;
            const hs = localStorage.getItem("retroHS") || 0;
            if (score > hs) localStorage.setItem("retroHS", score);
            alert("SYSTEM OVERLOAD! Score: " + score);
            location.reload();
        }

        updateUI(); update(); spawnHazard(); spawnBuilding();
    </script>
</body>
</html>
