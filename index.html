<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Pandemic Runner</title>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ff;
            --neon-green: #39ff14;
            --neon-orange: #ff6700;
            --covid-red: #ff0033;
            --bg-color: #050505;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: var(--neon-blue);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        #speed-controls {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }

        button {
            background: rgba(0, 243, 255, 0.1);
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 8px 16px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            transition: 0.2s;
        }

        button:hover, button.active {
            background: var(--neon-blue);
            color: black;
            box-shadow: 0 0 20px var(--neon-blue);
        }

        #game-container {
            position: relative;
            width: 800px;
            height: 300px;
            border-bottom: 4px solid var(--neon-blue);
            background: linear-gradient(to bottom, transparent 80%, rgba(0, 243, 255, 0.05));
            overflow: hidden;
        }

        /* Stickman & Gun */
        #dino {
            position: absolute;
            bottom: 0;
            left: 60px;
            width: 40px;
            height: 60px;
            will-change: transform;
        }

        .stickman-head {
            position: absolute;
            width: 14px;
            height: 14px;
            border: 2px solid var(--neon-pink);
            border-radius: 50%;
            top: 0; left: 11px;
            box-shadow: 0 0 10px var(--neon-pink);
        }

        .stickman-body {
            position: absolute;
            width: 2px;
            height: 25px;
            background: var(--neon-pink);
            left: 19px; top: 16px;
            box-shadow: 0 0 10px var(--neon-pink);
        }

        .blaster {
            position: absolute;
            left: 2px; top: 5px;
            width: 30px; height: 10px;
        }

        .gun-barrel { width: 22px; height: 6px; background: #555; border: 1px solid var(--neon-green); position: absolute; }
        .gun-tip { width: 5px; height: 6px; background: var(--neon-orange); position: absolute; right: -5px; }

        /* Spike Visuals */
        .spike {
            position: absolute;
            bottom: 0;
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-bottom: 40px solid var(--neon-blue);
            filter: drop-shadow(0 0 8px var(--neon-blue));
        }

        /* COVID-19 Visuals */
        .covid {
            position: absolute;
            width: 30px;
            height: 30px;
            background: var(--covid-red);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--covid-red);
            animation: pulse 1.5s infinite ease-in-out;
        }

        .covid::before, .covid::after {
            content: '';
            position: absolute;
            background: var(--covid-red);
            width: 140%; height: 4px;
            top: 45%; left: -20%;
        }
        .covid::after { transform: rotate(90deg); }

        .bullet {
            position: absolute;
            width: 12px; height: 4px;
            background: var(--neon-orange);
            border-radius: 2px;
            box-shadow: 0 0 10px var(--neon-orange);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        #score-board { margin-bottom: 10px; font-size: 28px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="speed-controls">
        <button onclick="setSpeed(0.5)">0.5x</button>
        <button class="active" onclick="setSpeed(1)">1x</button>
        <button onclick="setSpeed(2)">2x</button>
        <button onclick="setSpeed(3)">3x</button>
    </div>

    <div id="score-board">SCORE: 0 | BEST: <span id="high-score">0</span></div>
    
    <div id="game-container">
        <div id="dino">
            <div class="stickman-head"></div>
            <div class="stickman-body">
                <div class="blaster">
                    <div class="gun-barrel"></div>
                    <div class="gun-tip"></div>
                </div>
            </div>
        </div>
    </div>

    <div style="margin-top: 15px; opacity: 0.6;">[SPACE] JUMP | [S/ENTER] SHOOT</div>

    <script>
        const dino = document.getElementById("dino");
        const container = document.getElementById("game-container");
        const scoreElement = document.getElementById("score-board");
        
        let score = 0;
        let gameSpeed = 1;
        let isGameOver = false;
        let jumping = false;
        let jumpVelocity = 0;
        let dinoY = 0;
        const gravity = 0.6;

        function setSpeed(s) {
            gameSpeed = s;
            document.querySelectorAll('button').forEach(btn => {
                btn.classList.remove('active');
                if(parseFloat(btn.innerText) === s) btn.classList.add('active');
            });
        }

        // Smoother Physics Loop
        function update() {
            if (isGameOver) return;

            if (jumping) {
                jumpVelocity -= gravity;
                dinoY += jumpVelocity;
                if (dinoY <= 0) {
                    dinoY = 0;
                    jumping = false;
                }
            }
            dino.style.bottom = dinoY + "px";
            requestAnimationFrame(update);
        }

        document.addEventListener("keydown", (e) => {
            if (e.code === "Space" && !jumping) {
                jumping = true;
                jumpVelocity = 12;
            }
            if (e.code === "KeyS" || e.code === "Enter") shoot();
        });

        function shoot() {
            if (isGameOver) return;
            const bullet = document.createElement("div");
            bullet.classList.add("bullet");
            bullet.style.left = "90px";
            bullet.style.bottom = (dinoY + 35) + "px";
            container.appendChild(bullet);

            let bPos = 90;
            function moveBullet() {
                if (isGameOver) { bullet.remove(); return; }
                bPos += (15 * gameSpeed);
                bullet.style.left = bPos + "px";

                document.querySelectorAll(".covid").forEach(virus => {
                    if (checkHit(bullet, virus)) {
                        virus.remove();
                        bullet.remove();
                        score += 25;
                        updateUI();
                        return;
                    }
                });

                if (bPos < 800) requestAnimationFrame(moveBullet);
                else bullet.remove();
            }
            requestAnimationFrame(moveBullet);
        }

        function spawn() {
            if (isGameOver) return;
            const type = Math.random() > 0.6 ? 'covid' : 'spike';
            const obj = document.createElement("div");
            obj.classList.add(type);
            
            let pos = 850;
            obj.style.left = pos + "px";
            if (type === 'covid') obj.style.bottom = (Math.random() * 120 + 40) + "px";
            
            container.appendChild(obj);

            function moveObj() {
                if (isGameOver) return;
                pos -= (8 * gameSpeed);
                obj.style.left = pos + "px";

                if (checkHit(dino, obj)) endGame();

                if (pos > -60) requestAnimationFrame(moveObj);
                else {
                    obj.remove();
                    score += 5;
                    updateUI();
                }
            }
            requestAnimationFrame(moveObj);
            setTimeout(spawn, (Math.random() * 1500 + 800) / gameSpeed);
        }

        function checkHit(a, b) {
            const r1 = a.getBoundingClientRect();
            const r2 = b.getBoundingClientRect();
            return !(r1.right < r2.left || r1.left > r2.right || r1.bottom < r2.top || r1.top > r2.bottom);
        }

        function updateUI() {
            const hs = localStorage.getItem("covidHS") || 0;
            scoreElement.innerHTML = `SCORE: ${score} | BEST: ${hs}`;
        }

        function endGame() {
            isGameOver = true;
            const hs = localStorage.getItem("covidHS") || 0;
            if (score > hs) localStorage.setItem("covidHS", score);
            alert("VACCINE REQUIRED! FINAL SCORE: " + score);
            location.reload();
        }

        updateUI();
        update();
        spawn();
    </script>
</body>
</html>
