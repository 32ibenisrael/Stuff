<!DOCTYPE html>
<html>
<head>
<style>
    body { display: flex; justify-content: center; align-items: center; gap: 40px; background: #222; color: white; font-family: sans-serif; height: 100vh; margin: 0; }
    
    #wheel-container { position: relative; }
    #wheel { width: 400px; height: 400px; border-radius: 50%; border: 15px solid #d4af37; position: relative; overflow: hidden; transition: transform 6s cubic-bezier(0.15, 0, 0, 1); background: black; }
    .segment { position: absolute; width: 50%; height: 50%; transform-origin: 100% 100%; left: 0; top: 0; display: flex; justify-content: flex-end; padding-top: 25px; clip-path: polygon(0 0, 100% 0, 100% 100%); font-weight: bold; font-size: 16px; }
    .pointer { position: absolute; top: -30px; left: 190px; width: 0; height: 0; border-left: 25px solid transparent; border-right: 25px solid transparent; border-top: 40px solid #fff; z-index: 10; }

    #side-panel { background: #333; padding: 20px; border: 3px solid #d4af37; border-radius: 10px; width: 220px; text-align: center; }
    .slot-reel { font-size: 50px; background: #000; margin: 10px 0; border: 2px solid #555; padding: 10px; border-radius: 5px; }
    #roulette-result { font-size: 28px; font-weight: bold; margin-top: 15px; padding: 10px; border-top: 1px solid #555; }
</style>
</head>
<body>

    <div id="wheel-container">
        <div class="pointer"></div>
        <div id="wheel"></div>
    </div>

    <div id="side-panel">
        <h3>SLOT REELS</h3>
        <div style="display: flex; gap: 5px; justify-content: center;">
            <div id="r1" class="slot-reel">🎰</div>
            <div id="r2" class="slot-reel">🎰</div>
            <div id="r3" class="slot-reel">🎰</div>
        </div>
        <div id="roulette-result">Ready...</div>
        <button onclick="spin()" style="margin-top:20px; padding: 10px 30px; cursor:pointer; font-weight:bold;">SPIN ALL</button>
    </div>

<script>
    const wheelData = [
        {n: 0, c: '#27ae60'}, {n: 32, c: '#c0392b'}, {n: 15, c: '#000'}, {n: 19, c: '#c0392b'}, {n: 4, c: '#000'}, 
        {n: 21, c: '#c0392b'}, {n: 2, c: '#000'}, {n: 25, c: '#c0392b'}, {n: 17, c: '#000'}, {n: 34, c: '#c0392b'}, 
        {n: 6, c: '#000'}, {n: 27, c: '#c0392b'}, {n: 13, c: '#000'}, {n: 36, c: '#c0392b'}, {n: 11, c: '#000'}, 
        {n: 30, c: '#c0392b'}, {n: 8, c: '#000'}, {n: 23, c: '#c0392b'}, {n: 10, c: '#000'}, {n: 5, c: '#c0392b'}, 
        {n: 24, c: '#000'}, {n: 16, c: '#c0392b'}, {n: 33, c: '#000'}, {n: 1, c: '#c0392b'}, {n: 20, c: '#000'}, 
        {n: 14, c: '#c0392b'}, {n: 31, c: '#000'}, {n: 9, c: '#c0392b'}, {n: 22, c: '#000'}, {n: 18, c: '#c0392b'}, 
        {n: 29, c: '#000'}, {n: 7, c: '#c0392b'}, {n: 28, c: '#000'}, {n: 12, c: '#c0392b'}, {n: 35, c: '#000'}, 
        {n: 3, c: '#c0392b'}, {n: 26, c: '#000'}
    ];
    const slotSymbols = ['7️⃣', 'BAR', '🍒', '🍋', '🍊', '🍇'];

    const wheel = document.getElementById('wheel');
    wheelData.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'segment';
        div.style.backgroundColor = item.c;
        div.style.transform = `rotate(${i * (360/37)}deg) skewY(-80.27deg)`;
        div.innerHTML = `<span style="transform: skewY(80.27deg) rotate(90deg); margin-right: 15px;">${item.n}</span>`;
        wheel.appendChild(div);
    });

    let currentRotation = 0;
    function spin() {
        const slice = 360 / 37;
        const randomIdx = Math.floor(Math.random() * 37);
        currentRotation += (5 * 360) + (randomIdx * slice);
        wheel.style.transform = `rotate(${currentRotation}deg)`;
        document.getElementById('roulette-result').innerText = "Spinning...";

        // Animate slots
        ['r1', 'r2', 'r3'].forEach(id => {
            document.getElementById(id).innerText = slotSymbols[Math.floor(Math.random() * slotSymbols.length)];
        });

        setTimeout(() => {
            // Correctly identify the winner
            const winIdx = (37 - (Math.round((currentRotation % 360) / slice))) % 37;
            const winner = wheelData[winIdx];
            const colorName = winner.c === '#27ae60' ? 'Green' : (winner.c === '#c0392b' ? 'Red' : 'Black');
            
            document.getElementById('roulette-result').innerHTML = 
                `Win: <span style="color:${winner.c}">${winner.n}</span><br>${colorName}`;
        }, 6000);
    }
</script>
</body>
</html>
