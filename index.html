<!DOCTYPE html>
<html>
<head>
    <title>Simple Platformer</title>
    <style>
        body { margin: 0; overflow: hidden; background: #333; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { background: #555; border: 4px solid #fff; }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="800" height="400"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // Game variables
    let player = { x: 50, y: 300, w: 30, h: 30, dx: 0, dy: 0, jumping: false };
    let platforms =[
        { x: 0, y: 350, w: 800, h: 50 }, // Ground
        { x: 200, y: 250, w: 200, h: 20 },
        { x: 500, y: 150, w: 200, h: 20 }
    ];
    let gravity = 0.8;
    let keys = {};

    // Controls
    window.addEventListener("keydown", e => keys[e.code] = true);
    window.addEventListener("keyup", e => keys[e.code] = false);

    function update() {
        // Movement
        if (keys["ArrowLeft"]) player.dx = -5;
        else if (keys["ArrowRight"]) player.dx = 5;
        else player.dx = 0;

        if (keys["ArrowUp"] && !player.jumping) {
            player.dy = -15;
            player.jumping = true;
        }

        // Apply Gravity
        player.dy += gravity;
        player.x += player.dx;
        player.y += player.dy;

        // Collision detection
        player.jumping = true;
        for (let p of platforms) {
            if (player.x < p.x + p.w && player.x + player.w > p.x &&
                player.y + player.h > p.y && player.y + player.h < p.y + p.h + player.dy) {
                player.y = p.y - player.h;
                player.dy = 0;
                player.jumping = false;
            }
        }

        // Keep in bounds
        if (player.x < 0) player.x = 0;
        if (player.x + player.w > canvas.width) player.x = canvas.width - player.w;
        if (player.y > canvas.height) { player.x = 50; player.y = 300; } // Reset if fall

        draw();
        requestAnimationFrame(update);
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Draw Player
        ctx.fillStyle = "#ff4757";
        ctx.fillRect(player.x, player.y, player.w, player.h);

        // Draw Platforms
        ctx.fillStyle = "#2ed573";
        for (let p of platforms) {
            ctx.fillRect(p.x, p.y, p.w, p.h);
        }
    }

    update();
</script>
</body>
</html>
